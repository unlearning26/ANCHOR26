# Experimental Configuration: V4 - All Interventions Combined
# Expected Impact: +4-6 Dice, +15-25% cross-dataset transfer (multiplicative effects)
# Based on: nnU-Net multi-intervention approach

parent: [ssl3d_default_config.yaml]

experiment:
  name: "ablation_v4_combined"
  variant: "AllInterventionsCombined"
  hypothesis: "Combining FOV norm + physical cropping + gated rotations yields multiplicative gains"
  references:
    - "nnU-Net: Isensee et al., Nature Methods 2021"
    - "Zhou et al., Medical Image Analysis 2023"
    - "Azizi et al., Nature Biomedical Engineering 2021"
    - "Taleb et al., IEEE TPAMI 2021"

train:
  augmentation_class: "DataAugmentationDINO3d_V4_Combined"
  augmentation_params:
    global_crops_in_slice_scale: [0.4, 1.0]
    global_crops_cross_slice_scale: [0.5, 1.0]
    local_crops_in_slice_scale: [0.05, 0.4]
    local_crops_cross_slice_scale: [0.2, 0.6]
    local_crops_number: 10
    global_crops_size: 96
    local_crops_size: 48
    # Combined parameters
    target_inplane_fov_mm: [200.0, 300.0]
    anisotropy_threshold: 1.5

logging:
  experiment_tag: "v4_combined"
  track_augmentation_stats: true
  track_rotation_gating: true
  log_spacing_distribution: true
  log_anisotropy_distribution: true
  log_crop_size_mm: true
