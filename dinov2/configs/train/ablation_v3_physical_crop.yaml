# Experimental Configuration: V3 - Physical-Space Cropping
# Expected Impact: +1-2 Dice, +8-15% cross-dataset transfer, +20-30% detection mAP
# Based on: Azizi et al. 2021, Yan et al. 2018

parent: [ssl3d_default_config.yaml]

experiment:
  name: "ablation_v3_physical_crop"
  variant: "PhysicalSpaceCropping"
  hypothesis: "Sampling crops in mm ensures consistent anatomical extent across resolutions"
  references:
    - "Azizi et al., Nature Biomedical Engineering 2021"
    - "Yan et al., IEEE TMI 2018"

train:
  augmentation_class: "DataAugmentationDINO3d_V3_PhysicalCrop"
  augmentation_params:
    # Note: scales are now interpreted as physical FOV fractions (mm), not voxel fractions
    global_crops_in_slice_scale: [0.4, 1.0]
    global_crops_cross_slice_scale: [0.5, 1.0]
    local_crops_in_slice_scale: [0.05, 0.4]
    local_crops_cross_slice_scale: [0.2, 0.6]
    local_crops_number: 10
    global_crops_size: 96
    local_crops_size: 48

logging:
  experiment_tag: "v3_physical_crop"
  track_crop_statistics: true
  log_crop_size_mm: true  # Log actual physical crop sizes
