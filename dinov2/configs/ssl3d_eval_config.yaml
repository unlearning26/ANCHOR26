# Med3DINO Evaluation Config
# Minimal config containing only parameters used by linear3d.py and segmentation3d.py
# Training-specific parameters (dino, ibot, optim, train) are excluded.
#
# Usage:
#   python dinov2/eval/linear3d.py --config-file dinov2/configs/ssl3d_eval_config.yaml ...
#   Override via --opts: student.arch vit_base_3d crops.global_crops_size 112

# Compute precision for inference
compute_precision:
  grad_scaler: false  # Not needed for eval
  teacher:
    backbone:
      sharding_strategy: NO_SHARD
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
    dino_head:
      sharding_strategy: NO_SHARD
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
    ibot_head:
      sharding_strategy: NO_SHARD
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
  student:
    backbone:
      sharding_strategy: NO_SHARD
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
    dino_head:
      sharding_strategy: NO_SHARD
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32
    ibot_head:
      sharding_strategy: NO_SHARD
      mixed_precision:
        param_dtype: fp16
        reduce_dtype: fp16
        buffer_dtype: fp32

# Model architecture (override via --opts for different backbones)
student:
  arch: vit_large_3d      # Options: vit_base_3d, vit_large_3d
  patch_size: 16
  drop_path_rate: 0.0     # No drop path during eval
  layerscale: 1.0e-05
  drop_path_uniform: true
  pretrained_weights: ''
  full_pretrained_weights: ''
  ffn_layer: "mlp"
  block_chunks: 4         # Must match checkpoint training config
  qkv_bias: true
  proj_bias: true
  ffn_bias: true

# Input resolution (override via --opts for different crop sizes)
crops:
  global_crops_size: 96   # Must match checkpoint's training resolution (96 or 112)

# Placeholder sections required by config loader (values not used in eval)
dino:
  loss_weight: 0.0
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.0

ibot:
  loss_weight: 0.0
  mask_sample_probability: 0.0
  mask_ratio_min_max: [0.0, 0.0]
  separate_head: false
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_nlayers: 3
  head_hidden_dim: 2048

teacher:
  momentum_teacher: 1.0
  final_momentum_teacher: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 0

train:
  batch_size_per_gpu: 1
  output_dir: ./eval_outputs
  cache_dir: ./eval_cache
  seed: 0
  num_workers: 8

optim:
  epochs: 1
